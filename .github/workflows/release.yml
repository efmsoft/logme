name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare-release-notes:
    name: prepare-release-notes
    runs-on: ubuntu-latest
    outputs:
      notes_path: ${{ steps.notes.outputs.notes_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release notes from changelog.md
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          out="release-notes-${tag}.md"

          if [ ! -f "changelog.md" ]; then
            echo "changelog.md not found, using fallback notes" > "$out"
            echo "" >> "$out"
            echo "Release: $tag" >> "$out"
            echo "notes_path=$out" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Try to extract a section like:
          # ## [2.4.3] - 2026-...
          # or ## 2.4.3
          # for tag v2.4.3 -> version 2.4.3
          ver="${tag#v}"

          awk -v ver="$ver" '
            BEGIN { inside=0; found=0 }
            {
              if ($0 ~ "^##[[:space:]]*\[?" ver "\]?") { inside=1; found=1; print; next }
              if (inside && $0 ~ "^##[[:space:]]") { exit }
              if (inside) { print }
            }
            END {
              if (!found) {
                print "Release: v" ver
                print ""
                print "(No matching section found in changelog.md; please update it or adjust the header format.)"
              }
            }
          ' changelog.md > "$out"

          echo "notes_path=$out" >> "$GITHUB_OUTPUT"

      - name: Upload notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: ${{ steps.notes.outputs.notes_path }}
          if-no-files-found: error

  windows-msvc-x64:
    name: windows-msvc-x64-${{ matrix.artifact }}
    runs-on: windows-latest
    needs: prepare-release-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: static-minimal
            kind: static
            build_static: ON
            build_dynamic: OFF
            use_jsoncpp: OFF
            fmt_format: OFF
            vcpkg_deps: OFF
          - artifact: static-full
            kind: static
            build_static: ON
            build_dynamic: OFF
            use_jsoncpp: ON
            fmt_format: ON
            vcpkg_deps: ON
          - artifact: shared-full
            kind: shared
            build_static: OFF
            build_dynamic: ON
            use_jsoncpp: ON
            fmt_format: ON
            vcpkg_deps: ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps (Windows / vcpkg static libs with dynamic CRT)
        if: matrix.vcpkg_deps == 'ON'
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          if (-not $env:VCPKG_INSTALLATION_ROOT) { throw "VCPKG_INSTALLATION_ROOT is not set" }

          $triplet = "x64-windows-static-md-release"
          $overlay = Join-Path "${{ github.workspace }}" ".github\vcpkg-triplets"
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install fmt:$triplet jsoncpp:$triplet --overlay-triplets "$overlay"
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed: $LASTEXITCODE" }

      - name: Configure
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $artifact = "${{ matrix.artifact }}"
          $bdir = "build/$artifact"
          $prefix = "stage/logme-${{ github.ref_name }}-windows-msvc-x64-$artifact"

          New-Item -ItemType Directory -Force -Path $bdir | Out-Null
          New-Item -ItemType Directory -Force -Path $prefix | Out-Null

          $args = @(
            "-S", ".",
            "-B", $bdir,
            "-G", "Visual Studio 17 2022",
            "-A", "x64",
            "-DLOGME_BUILD_STATIC=${{ matrix.build_static }}",
            "-DLOGME_BUILD_DYNAMIC=${{ matrix.build_dynamic }}",
            "-DLOGME_BUILD_EXAMPLES=OFF",
            "-DLOGME_BUILD_TESTS=OFF",
            "-DLOGME_BUILD_TOOLS=OFF",
            "-DLOGME_ENABLE_INSTALL=ON",
            "-DUSE_JSONCPP=${{ matrix.use_jsoncpp }}",
            "-DLOGME_FMT_FORMAT=${{ matrix.fmt_format }}",
            "-DLOGME_STD_FORMAT=OFF"
          )

          if ("${{ matrix.vcpkg_deps }}" -eq "ON")
          {
            if (-not $env:VCPKG_INSTALLATION_ROOT) { throw "VCPKG_INSTALLATION_ROOT is not set" }
            $toolchain = Join-Path $env:VCPKG_INSTALLATION_ROOT "scripts\buildsystems\vcpkg.cmake"
            $overlay = Join-Path "${{ github.workspace }}" ".github\vcpkg-triplets"
            $args += @(
              "-DCMAKE_TOOLCHAIN_FILE=$toolchain",
              "-DVCPKG_TARGET_TRIPLET=x64-windows-static-md-release",
              "-DVCPKG_OVERLAY_TRIPLETS=$overlay"
            )
          }

          & cmake @args
          if ($LASTEXITCODE -ne 0) { throw "cmake configure failed: $LASTEXITCODE" }

      - name: Build (Release)
        shell: pwsh
        run: |
          $bdir = "build/${{ matrix.artifact }}"
          cmake --build $bdir --config Release
          if ($LASTEXITCODE -ne 0) { throw "cmake build failed: $LASTEXITCODE" }

      - name: Stage headers + binaries (no CMake install)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $artifact = "${{ matrix.artifact }}"
          $kind = "${{ matrix.kind }}"
          $bdir = "build/$artifact"
          $prefix = "stage/logme-${{ github.ref_name }}-windows-msvc-x64-$artifact"

          $incDst = Join-Path $prefix "include"
          $libDst = Join-Path $prefix "lib"
          $binDst = Join-Path $prefix "bin"

          New-Item -ItemType Directory -Force -Path $incDst | Out-Null
          New-Item -ItemType Directory -Force -Path $libDst | Out-Null
          New-Item -ItemType Directory -Force -Path $binDst | Out-Null

          # Headers: repo path is logme/include
          if (-not (Test-Path "logme/include"))
          {
            throw "Missing repo folder: logme/include"
          }
          Copy-Item -Recurse -Force "logme/include/*" $incDst

          function Pick-LatestFile($files)
          {
            $files | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          }

          if ($kind -eq "static")
          {
            $candidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logme.lib" |
              Where-Object { $_.FullName -match "\\Release\\" }

            if (-not $candidates) { $candidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logme.lib" }
            if (-not $candidates) { throw "Built artifact not found: logme.lib" }

            $lib = Pick-LatestFile $candidates
            Copy-Item -Force $lib.FullName (Join-Path $libDst "logme.lib")

            $pdbCandidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logme.pdb" |
              Where-Object { $_.FullName -match "\\Release\\" }
            if ($pdbCandidates)
            {
              $pdb = Pick-LatestFile $pdbCandidates
              Copy-Item -Force $pdb.FullName (Join-Path $libDst "logme.pdb")
            }
          }
          else
          {
            $dllCandidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logmed.dll" |
              Where-Object { $_.FullName -match "\\Release\\" }
            if (-not $dllCandidates) { $dllCandidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logmed.dll" }
            if (-not $dllCandidates) { throw "Built artifact not found: logmed.dll" }

            $dll = Pick-LatestFile $dllCandidates
            Copy-Item -Force $dll.FullName (Join-Path $binDst "logmed.dll")

            $implibCandidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logmed.lib" |
              Where-Object { $_.FullName -match "\\Release\\" }
            if (-not $implibCandidates) { $implibCandidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logmed.lib" }
            if (-not $implibCandidates) { throw "Built artifact not found: logmed.lib" }

            $implib = Pick-LatestFile $implibCandidates
            Copy-Item -Force $implib.FullName (Join-Path $libDst "logmed.lib")

            $pdbCandidates = Get-ChildItem -Recurse -File -Path $bdir -Filter "logmed.pdb" |
              Where-Object { $_.FullName -match "\\Release\\" }
            if ($pdbCandidates)
            {
              $pdb = Pick-LatestFile $pdbCandidates
              Copy-Item -Force $pdb.FullName (Join-Path $binDst "logmed.pdb")
            }
          }

      - name: Verify staged files
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $artifact = "${{ matrix.artifact }}"
          $kind = "${{ matrix.kind }}"
          $prefix = "stage/logme-${{ github.ref_name }}-windows-msvc-x64-$artifact"

          if (-not (Test-Path (Join-Path $prefix "include"))) { throw "Missing include/" }
          if (-not (Test-Path (Join-Path $prefix "lib"))) { throw "Missing lib/" }

          if ($kind -eq "static")
          {
            if (-not (Test-Path (Join-Path $prefix "lib\logme.lib"))) { throw "Missing lib/logme.lib" }
          }
          else
          {
            if (-not (Test-Path (Join-Path $prefix "bin\logmed.dll"))) { throw "Missing bin/logmed.dll" }
            if (-not (Test-Path (Join-Path $prefix "lib\logmed.lib"))) { throw "Missing lib/logmed.lib" }
          }

      - name: Add docs to archive root
        shell: pwsh
        run: |
          $prefix = "stage/logme-${{ github.ref_name }}-windows-msvc-x64-${{ matrix.artifact }}"

          if (Test-Path "LICENSE")      { Copy-Item "LICENSE"      (Join-Path $prefix "LICENSE")      -Force }
          if (Test-Path "README.md")    { Copy-Item "README.md"    (Join-Path $prefix "README.md")    -Force }
          if (Test-Path "changelog.md") { Copy-Item "changelog.md" (Join-Path $prefix "changelog.md") -Force }

      - name: Pack + SHA256
        shell: pwsh
        run: |
          $root = "stage"
          $name = "logme-${{ github.ref_name }}-windows-msvc-x64-${{ matrix.artifact }}"
          $dir = Join-Path $root $name
          $zip = "$name.zip"
          $sha = "$zip.sha256.txt"

          if (Test-Path $zip) { Remove-Item -Force $zip }
          Compress-Archive -Path (Join-Path $dir "*") -DestinationPath $zip

          $hashLine = (certutil -hashfile $zip SHA256 | Select-String -Pattern "^[0-9A-Fa-f]{64}$").Line
          "$hashLine  $zip" | Out-File -Encoding ascii $sha

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: logme-${{ github.ref_name }}-windows-msvc-x64-${{ matrix.artifact }}
          path: |
            logme-${{ github.ref_name }}-windows-msvc-x64-${{ matrix.artifact }}.zip
            logme-${{ github.ref_name }}-windows-msvc-x64-${{ matrix.artifact }}.zip.sha256.txt
          if-no-files-found: error

      - name: Download release notes artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Create/Update GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes-${{ github.ref_name }}.md
          files: |
            logme-${{ github.ref_name }}-windows-msvc-x64-${{ matrix.artifact }}.zip
            logme-${{ github.ref_name }}-windows-msvc-x64-${{ matrix.artifact }}.zip.sha256.txt

  linux-ubuntu-22:
    name: linux-ubuntu-22.04-${{ matrix.artifact }}
    runs-on: ubuntu-22.04
    needs: prepare-release-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: static-minimal
            build_static: ON
            build_dynamic: OFF
            use_jsoncpp: OFF
            fmt_format: OFF
            vcpkg_deps: OFF
          - artifact: static-full
            build_static: ON
            build_dynamic: OFF
            use_jsoncpp: ON
            fmt_format: ON
            vcpkg_deps: ON
          - artifact: shared-full
            build_static: OFF
            build_dynamic: ON
            use_jsoncpp: ON
            fmt_format: ON
            vcpkg_deps: ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap vcpkg
        if: matrix.vcpkg_deps == 'ON'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VCPKG_INSTALLATION_ROOT:-}" ]; then
            echo "VCPKG_INSTALLATION_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
            "$HOME/vcpkg/bootstrap-vcpkg.sh"
          else
            echo "Using VCPKG_INSTALLATION_ROOT=$VCPKG_INSTALLATION_ROOT"
          fi

      - name: Install deps (Linux / vcpkg static libs)
        if: matrix.vcpkg_deps == 'ON'
        shell: bash
        run: |
          set -euo pipefail
          triplet="x64-linux-static-release"
          overlay="${GITHUB_WORKSPACE}/.github/vcpkg-triplets"
          "${VCPKG_INSTALLATION_ROOT}/vcpkg" install "fmt:${triplet}" "jsoncpp:${triplet}" --overlay-triplets "$overlay"

      - name: Configure
        shell: bash
        run: |
          set -euo pipefail
          artifact="${{ matrix.artifact }}"
          bdir="build/${artifact}"
          prefix="stage/logme-${GITHUB_REF_NAME}-linux-ubuntu-22.04-x64-${artifact}"

          args=(
            -S .
            -B "$bdir"
            -DCMAKE_BUILD_TYPE=Release
            -DLOGME_BUILD_STATIC=${{ matrix.build_static }}
            -DLOGME_BUILD_DYNAMIC=${{ matrix.build_dynamic }}
            -DLOGME_BUILD_EXAMPLES=OFF
            -DLOGME_BUILD_TESTS=OFF
            -DLOGME_BUILD_TOOLS=OFF
            -DLOGME_ENABLE_INSTALL=ON
            -DUSE_JSONCPP=${{ matrix.use_jsoncpp }}
            -DLOGME_FMT_FORMAT=${{ matrix.fmt_format }}
            -DLOGME_STD_FORMAT=OFF
          )

          if [ "${{ matrix.vcpkg_deps }}" = "ON" ]; then
            args+=(
              -DCMAKE_TOOLCHAIN_FILE="${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake"
              -DVCPKG_TARGET_TRIPLET=x64-linux-static-release
              -DVCPKG_OVERLAY_TRIPLETS="${GITHUB_WORKSPACE}/.github/vcpkg-triplets"
            )
          fi

          cmake "${args[@]}"
          cmake --build "$bdir" --config Release
          cmake --install "$bdir" --prefix "$prefix"

          for f in LICENSE README.md changelog.md; do
            if [ -f "$f" ]; then
              cp -f "$f" "$prefix/$f"
            fi
          done

      - name: Verify no external fmt/jsoncpp shared libs are required
        if: matrix.artifact == 'shared-full'
        shell: bash
        run: |
          set -euo pipefail
          artifact="${{ matrix.artifact }}"
          prefix="stage/logme-${GITHUB_REF_NAME}-linux-ubuntu-22.04-x64-${artifact}"
          so="$(find "$prefix" -type f -name 'liblogmed.so*' | head -n 1)"
          if [ -z "$so" ]; then
            echo "liblogmed.so was not found in $prefix"
            exit 1
          fi

          ldd "$so"
          if ldd "$so" | grep -E 'lib(fmt|jsoncpp)\.so'; then
            echo "liblogmed.so depends on external fmt/jsoncpp shared library"
            exit 1
          fi

      - name: Pack + SHA256
        shell: bash
        run: |
          set -euo pipefail
          name="logme-${GITHUB_REF_NAME}-linux-ubuntu-22.04-x64-${{ matrix.artifact }}"
          (cd stage && tar -czf "../${name}.tar.gz" "${name}")
          sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256.txt"

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: logme-${{ github.ref_name }}-linux-ubuntu-22.04-x64-${{ matrix.artifact }}
          path: |
            logme-${{ github.ref_name }}-linux-ubuntu-22.04-x64-${{ matrix.artifact }}.tar.gz
            logme-${{ github.ref_name }}-linux-ubuntu-22.04-x64-${{ matrix.artifact }}.tar.gz.sha256.txt
          if-no-files-found: error

      - name: Download release notes artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Create/Update GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes-${{ github.ref_name }}.md
          files: |
            logme-${{ github.ref_name }}-linux-ubuntu-22.04-x64-${{ matrix.artifact }}.tar.gz
            logme-${{ github.ref_name }}-linux-ubuntu-22.04-x64-${{ matrix.artifact }}.tar.gz.sha256.txt
