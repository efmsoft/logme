<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>logmeweb Login</title>
  <link rel="icon" href="/static/assets/logme.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <img class="login-logo" src="/static/assets/logo-wide.png" alt="logme logo">
      <div class="eyebrow">secure access</div>
      <h1>Sign in to logmeweb</h1>
      <p>Authentication is required before you can discover and control running logme applications.</p>

      <label for="loginPassword">Password</label>
      <input id="loginPassword" type="password" autocomplete="current-password" autofocus>
      <button class="primary full" id="loginButton">Sign in</button>
      <div id="loginStatus" class="status-line muted"></div>
    </section>
  </main>

  <script>
    const password = document.getElementById('loginPassword');
    const button = document.getElementById('loginButton');
    const status = document.getElementById('loginStatus');

    async function Login()
    {
      status.classList.remove('error-inline');
      status.classList.add('muted');
      status.textContent = 'Signing in...';
      button.disabled = true;

      try
      {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: password.value })
        });
        const data = await response.json();

        if (!response.ok)
          throw new Error(data.detail || 'Login failed');

        window.location.href = '/';
      }
      catch (e)
      {
        status.classList.remove('muted');
        status.classList.add('error-inline');
        status.textContent = e.message || 'Login failed';
      }
      finally
      {
        button.disabled = false;
      }
    }

    button.addEventListener('click', Login);
    password.addEventListener('keydown', event =>
    {
      if (event.key === 'Enter')
        Login();
    });
  </script>
</body>
</html>
